    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#g)"/>
  <circle cx="975" cy="145" r="92" fill="#d8c6b4" opacity="0.7"/>
  <rect x="110" y="120" width="460" height="28" rx="14" fill="#121212" opacity="0.18"/>
  <rect x="110" y="176" width="320" height="18" rx="9" fill="#121212" opacity="0.14"/>
  <rect x="110" y="218" width="380" height="18" rx="9" fill="#121212" opacity="0.12"/>
  <rect x="110" y="300" width="260" height="18" rx="9" fill="#121212" opacity="0.10"/>
